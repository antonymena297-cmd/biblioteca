<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Libros - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">📚 Biblioteca</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" href="/libros">Libros</a></li>
                    <li class="nav-item"><a class="nav-link" href="/usuarios">Usuarios</a></li>
                    <li class="nav-item"><a class="nav-link" href="/prestamos">Préstamos</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <h2>📖 Gestión de Libros</h2>
        
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        
        <div class="row mb-3">
            <div class="col-md-6">
                <a href="/libros/nuevo" class="btn btn-primary">+ Agregar Libro</a>
            </div>
            <div class="col-md-6">
                <form action="/libros/buscar" method="get" class="row g-2">
                    <div class="col-md-5">
                        <input type="text" name="titulo" class="form-control" placeholder="Buscar por título">
                    </div>
                    <div class="col-md-5">
                        <input type="text" name="autor" class="form-control" placeholder="Buscar por autor">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-secondary w-100">Buscar</button>
                    </div>
                </form>
            </div>
        </div>
        
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Autor</th>
                    <th>ISBN</th>
                    <th>Año</th>
                    <th>Disponible</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="libro : ${libros}">
                    <td th:text="${libro.id}">1</td>
                    <td th:text="${libro.titulo}">Título</td>
                    <td th:text="${libro.autor}">Autor</td>
                    <td th:text="${libro.isbn}">ISBN</td>
                    <td th:text="${libro.anioPublicacion}">2024</td>
                    <td>
                        <span th:if="${libro.disponible}" class="badge bg-success">Disponible</span>
                        <span th:unless="${libro.disponible}" class="badge bg-danger">Prestado</span>
                    </td>
                    <td>
                        <a th:href="@{/libros/editar/{id}(id=${libro.id})}" class="btn btn-sm btn-warning">✏️ Editar</a>
                        <a th:href="@{/libros/eliminar/{id}(id=${libro.id})}" class="btn btn-sm btn-danger" 
                           onclick="return confirm('¿Eliminar este libro?')">🗑️ Eliminar</a>
                    </td>
                </tr>
                <tr th:if="${libros.isEmpty()}">
                    <td colspan="7" class="text-center">No hay libros registrados</td>
                </tr>
            </tbody>
        </table>
        <a href="/" class="btn btn-secondary">← Volver al Inicio</a>
    </div>
</body>
</html>
