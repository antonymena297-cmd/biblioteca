<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Libro - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">📚 Biblioteca</a>
        </div>
    </nav>
    
    <div class="container mt-4">
        <h2>✏️ Editar Libro</h2>
        
        <form th:action="@{/libros/actualizar/{id}(id=${libro.id})}" th:object="${libro}" method="post" class="mt-3">
            <div class="mb-3">
                <label class="form-label">Título</label>
                <input type="text" th:field="*{titulo}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Autor</label>
                <input type="text" th:field="*{autor}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">ISBN</label>
                <input type="text" th:field="*{isbn}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Año de Publicación</label>
                <input type="number" th:field="*{anioPublicacion}" class="form-control" required>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" th:field="*{disponible}" class="form-check-input">
                <label class="form-check-label">Disponible</label>
            </div>
            <button type="submit" class="btn btn-primary">Actualizar Libro</button>
            <a href="/libros" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</body>
</html>
