<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Usuarios - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">📚 Biblioteca</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/libros">Libros</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/usuarios">Usuarios</a></li>
                    <li class="nav-item"><a class="nav-link" href="/prestamos">Préstamos</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <h2>👥 Gestión de Usuarios</h2>
        
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        
        <a href="/usuarios/nuevo" class="btn btn-primary mb-3">+ Agregar Usuario</a>
        
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Cédula</th>
                    <th>Email</th>
                    <th>Teléfono</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="usuario : ${usuarios}">
                    <td th:text="${usuario.id}">1</td>
                    <td th:text="${usuario.nombre}">Nombre</td>
                    <td th:text="${usuario.apellido}">Apellido</td>
                    <td th:text="${usuario.cedula}">Cédula</td>
                    <td th:text="${usuario.email}">Email</td>
                    <td th:text="${usuario.telefono}">Teléfono</td>
                    <td>
                        <a th:href="@{/usuarios/eliminar/{id}(id=${usuario.id})}" class="btn btn-sm btn-danger"
                           onclick="return confirm('¿Eliminar este usuario?')">🗑️ Eliminar</a>
                    </td>
                </tr>
                <tr th:if="${usuarios.isEmpty()}">
                    <td colspan="7" class="text-center">No hay usuarios registrados</td>
                </tr>
            </tbody>
        </table>
        <a href="/" class="btn btn-secondary">← Volver al Inicio</a>
    </div>
</body>
</html>
