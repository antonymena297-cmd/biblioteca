<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Préstamo - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">📚 Biblioteca</a>
        </div>
    </nav>
    
    <div class="container mt-4">
        <h2>📖 Realizar Nuevo Préstamo</h2>
        
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        
        <form th:action="@{/prestamos/realizar}" method="post" class="mt-3">
            <div class="mb-3">
                <label class="form-label">Seleccionar Libro (solo disponibles)</label>
                <select name="libroId" class="form-select" required>
                    <option value="">-- Seleccione un libro --</option>
                    <option th:each="libro : ${libros}" th:value="${libro.id}" 
                            th:text="${libro.titulo} + ' - ' + ${libro.autor}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Seleccionar Usuario</label>
                <select name="usuarioId" class="form-select" required>
                    <option value="">-- Seleccione un usuario --</option>
                    <option th:each="usuario : ${usuarios}" th:value="${usuario.id}" 
                            th:text="${usuario.nombre} + ' ' + ${usuario.apellido} + ' (' + ${usuario.cedula} + ')'"></option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Realizar Préstamo</button>
            <a href="/prestamos" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</body>
</html>
